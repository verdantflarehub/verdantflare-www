name: build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  VERSION: www-1.0.1

jobs:
  build:
    name: Build html and image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build html
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image metadata
        id: image
        env:
          REGISTRY_ENDPOINT: ${{ secrets.REGISTRY_ENDPOINT_ALIYUN }}
        run: |
          registry_endpoint="${REGISTRY_ENDPOINT%/}"

          if [ -z "$registry_endpoint" ]; then
            echo "REGISTRY_ENDPOINT_ALIYUN is required" >&2
            exit 1
          fi

          echo "registry_endpoint=$registry_endpoint" >> "$GITHUB_OUTPUT"
          echo "image_namespace=$registry_endpoint/wod" >> "$GITHUB_OUTPUT"
          echo "image_name=$registry_endpoint/wod/verdantflare" >> "$GITHUB_OUTPUT"

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.image.outputs.registry_endpoint }}
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.image.outputs.image_name }}:${{ env.VERSION }}
          build-args: |
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.VERSION }}
            NGINX_BASE=${{ steps.image.outputs.image_namespace }}/nginx:1.27
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image push success
        run: echo "${{ steps.image.outputs.image_name }}:${{ env.VERSION }} built and pushed successfully!"
